<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>打工人单位换算器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: linear-gradient(120deg, #f8fafc 0%, #e0f0ff 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
      margin: 0; 
      padding: 0;
      min-height: 100vh;
    }
    .slogan {
      color: #267399;
      background: linear-gradient(90deg, #cdf0ea 60%, #f9f9f9 100%);
      font-size: 1.25em;
      font-weight: bold;
      padding: 18px 4vw;
      border-bottom-left-radius: 40px 120px;
      border-bottom-right-radius: 40px 120px;
      box-shadow: 0 4px 12px #aaa2;
      text-shadow: 1px 1px 2px #fff7, 0 1px 0 #0a86b8;
      text-align: center;
      letter-spacing: 1.5px;
    }
    .container {
      max-width: 720px;
      margin: 2.5rem auto;
      background: #ffffffcc;
      border-radius: 16px;
      box-shadow: 0 6px 30px #a2cdf844;
      padding: 32px 5vw 30px 5vw;
    }
    h2 {
      text-align: center;
      color: #206690;
      letter-spacing: 2px;
      margin-bottom: 1em;
    }
    label {
      display: block;
      font-weight: 500;
      color: #3580a6;
      margin-bottom: 10px;
      font-size: 1em;
    }
    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5em;
      align-items: flex-end;
      margin-bottom: 2em;
    }
    textarea {
      flex: 2 1 200px;
      min-height: 80px;
      max-height: 200px;
      border: 1.5px solid #60b6f5;
      font-size: 1.05em;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      background: #f0f9fe;
      transition: box-shadow 0.2s;
    }
    textarea:focus { box-shadow: 0 0 0 2px #3ac7fa33; outline: none;}
    select {
      flex: 1 1 120px;
      font-size: 1.1em;
      border-radius: 8px;
      padding: 10px 8px;
      border: 1.5px solid #d0dee9;
      margin-left: 8px;
      background: #eafdff;
    }
    table {
      margin-top: 2em;
      border-collapse: collapse;
      width: 100%;
      background: #f9fdff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px #90caf955;
      font-size: 1em;
      word-break: break-all;
    }
    th, td {
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 8px;
      text-align: center;
    }
    th {
      background: #c5e3fc;
      color: #176690;
      font-weight: bold;
      font-size: 1.08em;
    }
    tr:last-child td { border-bottom: none; }
    @media (max-width: 700px) {
      .container { padding: 16px 2vw; }
      h2 { font-size: 1.1em; }
      th, td { font-size: 0.94em; }
    }
  </style>
</head>
<body>
<div class="slogan" id="slogan"></div>
<div class="container">
  <h2>打工人专用单位换算器</h2>
<h2>m/μm/mil/inch/u”</h2>
  <label>
    请输入数据（可多行, 逗号/空格分隔）：<br>
  </label>
  <div class="input-row">
    <textarea
      id="batchInput"
      placeholder="请输入……"
      oninput="convert()"
    ></textarea>
    <select id="unit" onchange="convert()">
      <option value="mm">毫米 (mm)</option>
      <option value="um">微米 (μm)</option>
      <option value="mil">密尔 (mil)</option>
      <option value="in">英寸 (in)</option>
      <option value="uin">微英寸 (u”)</option>
    </select>
  </div>
  <table id="resultTable">
    <thead>
      <tr>
        <th>原始输入</th>
        <th>毫米 (mm)</th>
        <th>微米 (μm)</th>
        <th>密尔 (mil)</th>
        <th>英寸 (in)</th>
        <th>微英寸 (u”)</th>
      </tr>
    </thead>
    <tbody id="result"></tbody>
  </table>
</div>
<script>
// 标语库
const slogans = [
  "打工人，打工魂，打工都是人上人！",
  "钱包瘦了，梦想可不能瘦！",
  "搬砖路上，段子为伴~",
  "腰酸背痛程序员，梦里工资乘以ten。",
  "工作是暂时的，头秃是永久的。",
  "上班一时爽，一直上班一直爽。",
  "加班使我快乐？我没说过！",
  "世另我：上班像上坟，下班似还魂。",
  "挣钱难，摸鱼难，被发现更难！",
  "卷生卷死，摸鱼偷闲。",
  "钱没挣到，群里表情包倒是有一套。",
  "人生苦短，多喝热水不如多摸鱼。",
  "工资就像大姨妈，一个月来一次，几天就没了。",
  "梦想很丰满，工资很骨感。",
  "生活不止眼前的KPI，还有远方的年终奖。"
];
document.getElementById('slogan').textContent = slogans[Math.floor(Math.random() * slogans.length)];

// 单位转换
const factors = {
  mm:   1,
  um:   1000,
  mil:  39.370078740157,
  in:   0.039370078740157,
  uin:  39370.078740157
};
const unitNames = {
  mm:  "毫米 (mm)",
  um:  "微米 (μm)",
  mil: "密尔 (mil)",
  in:  "英寸 (in)",
  uin: "微英寸 (u”)"
};
// 反向换算到mm
function toMM(val, unit) {
  switch(unit) {
    case 'mm':  return val;
    case 'um':  return val / 1000;
    case 'mil': return val / 39.370078740157;
    case 'in':  return val / 0.039370078740157;
    case 'uin': return val / 39370.078740157;
    default: return 0;
  }
}
// 格式化
function fmt(n) {
  let s = (+n).toFixed(6).replace(/\.?0+$/, "");
  return s.length > 14 ? (+n).toExponential(6) : s;
}

// 支持批量换算
function convert() {
  const input = document.getElementById('batchInput').value;
  const unit = document.getElementById('unit').value;
  // 拆分支持多行/逗号/空格
  let nums = [];
  input.split(/[\n;]/).forEach(line => {
    line.split(/[\s,，]+/).forEach(cell => {
      if(cell.trim().length) nums.push(cell.trim());
    });
  });
  let html = "";
  if(nums.length === 0) {
    html = `<tr><td colspan="6" style="color:#888">请输入要换算的数据</td></tr>`;
  } else {
    for(const n of nums) {
      let val = parseFloat(n);
      if(isNaN(val)) {
        html += `<tr><td style="color:#ff6666;font-style:italic;">${n}</td>
                  <td colspan="5" style="color:#f99;">无效数字</td></tr>`;
        continue;
      }
      let mmValue = toMM(val, unit);
      html += `<tr>
        <td style="color: #157bb8;"><strong>${fmt(val)}</strong></td>
        <td>${fmt(mmValue)}</td>
        <td>${fmt(mmValue * factors.um)}</td>
        <td>${fmt(mmValue * factors.mil)}</td>
        <td>${fmt(mmValue * factors.in)}</td>
        <td>${fmt(mmValue * factors.uin)}</td>
      </tr>`;
    }
  }
  document.getElementById('result').innerHTML = html;
}
convert();
</script>
</body>
</html>
